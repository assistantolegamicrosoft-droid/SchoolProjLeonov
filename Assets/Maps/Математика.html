<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Карта подготовки к экзамену</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --line-color: #cbd5e1;
            --shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 50px -12px rgba(99, 102, 241, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            overflow-x: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            -webkit-text-size-adjust: 100%;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(148,163,184,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148,163,184,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* === ГЛАВНОЕ ПРАВИЛО ДЛЯ IPHONE === */
        #mobile-list-container { display: none; }
        #desktop-map-container { display: block; }

        @media only screen and (max-width: 900px) {
            #mobile-list-container { display: block !important; }
            #desktop-map-container { display: none !important; }
        }

        /* === ДЕСКТОПНАЯ ВЕРСИЯ === */
        .mindmap-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .mindmap {
            position: relative;
            width: 1200px;
            height: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .connection-line {
            fill: none;
            stroke: var(--line-color);
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 1.2s ease-out forwards;
        }

        .center-node {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            box-shadow: var(--shadow-hover);
            text-align: center;
            padding: 15px;
        }

        .center-node i { font-size: 2.2rem; margin-bottom: 12px; }
        .center-node h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
        .center-node p { font-size: 0.85rem; opacity: 0.9; }

        .node-card {
            position: absolute;
            background: var(--card-bg);
            padding: 14px 28px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            z-index: 10;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            min-width: 160px;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .node-card:active { transform: translateY(-2px) scale(1.02); border-color: var(--primary-light); }
        .node-card.right { justify-content: flex-start; }
        .node-card.left { justify-content: flex-end; flex-direction: row-reverse; }
        .node-card i { font-size: 1.3rem; color: var(--primary); width: 24px; text-align: center; }
        .node-card span { font-weight: 600; color: var(--text-dark); font-size: 1rem; }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* === МОБИЛЬНАЯ ВЕРСИЯ === */
        #mobile-list-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 15px;
            min-height: 100vh;
        }

        .mobile-header {
            text-align: center;
            margin-bottom: 25px;
            padding: 25px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            color: white;
            box-shadow: var(--shadow-hover);
        }

        .mobile-header i { font-size: 2.5rem; margin-bottom: 10px; }
        .mobile-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
        .mobile-header p { font-size: 0.9rem; opacity: 0.9; }

        .mobile-task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ИСПРАВЛЕНИЕ ДЛЯ IPHONE - КЛИКАБЕЛЬНЫЕ КАРТОЧКИ */
        .mobile-task-card {
            background: var(--card-bg);
            padding: 18px 20px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            text-decoration: none;
            position: relative;
            z-index: 10;
            -webkit-touch-callout: none;
            user-select: none;
            /* ВАЖНО ДЛЯ IPHONE */
            touch-action: manipulation;
            -webkit-appearance: none;
        }

        .mobile-task-card:active {
            transform: scale(0.98);
            border-color: var(--primary-light);
            background: #f8f9ff;
        }

        .mobile-task-card i { font-size: 1.4rem; color: var(--primary); width: 28px; text-align: center; flex-shrink: 0; }
        .mobile-task-card span { font-weight: 600; color: var(--text-dark); font-size: 1rem; flex-grow: 1; }
        .mobile-task-card .arrow { color: var(--text-gray); font-size: 1rem; flex-shrink: 0; }

        /* === МОДАЛЬНОЕ ОКНО === */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 35px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 80px -20px rgba(0,0,0,0.3);
            transform: translateY(15px);
            transition: transform 0.3s ease;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal.active .modal-content { transform: translateY(0); }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 20px 20px 0 0;
        }

        .modal-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            color: var(--primary);
            font-size: 1.8rem;
        }

        .modal-title { font-size: 1.4rem; font-weight: 700; color: var(--text-dark); margin-bottom: 12px; }
        .modal-text { color: var(--text-gray); margin-bottom: 28px; line-height: 1.6; font-size: 0.95rem; }

        .modal-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            padding: 14px 32px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
            min-height: 50px;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .modal-btn:active { background: #4f46e5; transform: translateY(-2px); }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            font-size: 1.6rem;
            color: #94a3b8;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: transparent;
            border: none;
            z-index: 10;
        }

        .modal-close:active { color: var(--text-dark); background: #f1f5f9; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <!-- === ВЕРСИЯ ДЛЯ КОМПЬЮТЕРА === -->
    <div id="desktop-map-container">
        <div class="mindmap-container">
            <div class="mindmap" id="mindmap">
                <svg class="connections" id="svgLines"></svg>
                <div class="center-node">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>ЭКЗАМЕН</h1>
                    <p>Подготовка</p>
                </div>
            </div>
        </div>
    </div>

    <!-- === ВЕРСИЯ ДЛЯ ТЕЛЕФОНА === -->
    <div id="mobile-list-container">
        <div class="mobile-header">
            <i class="fas fa-graduation-cap"></i>
            <h1>ЭКЗАМЕН</h1>
            <p>Подготовка</p>
        </div>
        
        <div class="mobile-task-list">
            <div class="mobile-task-card" onclick="handleMobileClick(0)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 1</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(1)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 2</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(2)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 3</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(3)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 4</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(4)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 5</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(5)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 6</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(6)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 7</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(7)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 8</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(8)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 9</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(9)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 10</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(10)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 11</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="mobile-task-card" onclick="handleMobileClick(11)">
                <i class="fas fa-file-alt"></i>
                <span>Задание 12</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()" type="button">&times;</button>
            <div class="modal-icon" id="modalIcon">
                <i class="fas fa-file-alt"></i>
            </div>
            <h3 class="modal-title" id="modalTitle">Задание</h3>
            <p class="modal-text">Нажмите на кнопку ниже, чтобы открыть документ с материалами для этого задания.</p>
            <a href="#" class="modal-btn" id="modalLink" target="_blank">
                <i class="fas fa-external-link-alt"></i> Открыть документ
            </a>
        </div>
    </div>

    <script>
        // === ДАННЫЕ ЗАДАНИЙ ===
        // ВСТАВЬТЕ ВАШИ ССЫЛКИ ВМЕСТО #
        const tasks = [
            { id: 1, title: "Задание 1", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/auLh/QcR46qxy3" },
            { id: 2, title: "Задание 2", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/xDuF/UyNEtx4qC" },
            { id: 3, title: "Задание 3", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/7Zk1/7QNeep92m" },
            { id: 4, title: "Задание 4", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/BG1F/43bbuthcd" },
            { id: 5, title: "Задание 5", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/FAkw/vw9u5D2ey" },
            { id: 6, title: "Задание 6", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/RQBh/EYB3ZvszH" },
            { id: 7, title: "Задание 7", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/iQZA/DLDtL36Ud" },
            { id: 8, title: "Задание 8", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/ah14/QEP64UDMJ" },
            { id: 9, title: "Задание 9", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/Rb8Y/MwxMBLSL3" },
            { id: 10, title: "Задание 10", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/3ft5/LZ6yKwfGy" },
            { id: 11, title: "Задание 11", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/Dndx/dG79SvtoE" },
            { id: 12, title: "Задание 12", icon: "fas fa-file-alt", link: "https://cloud.mail.ru/public/Fd6e/Xz7F7AZHy" }
        ];

        // === ДЕСКТОПНАЯ ВЕРСИЯ ===
        function createDesktopBranches() {
            const svg = document.getElementById('svgLines');
            const mindmap = document.getElementById('mindmap');
            if (!svg || !mindmap) return;
            
            const centerX = 600;
            const centerY = 350;
            
            const leftConfig = { side: 'left', startX: 510, endX: 230, startY: 100, gap: 85, cardWidth: 160 };
            const rightConfig = { side: 'right', startX: 690, endX: 970, startY: 100, gap: 85, cardWidth: 160 };

            function createBranch(task, config, index) {
                const y = config.startY + index * config.gap;
                const startX = config.side === 'right' ? centerX + 90 : centerX - 90;
                const endX = config.endX;
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const midX = (startX + endX) / 2;
                const d = `M ${startX} ${centerY} C ${midX} ${centerY}, ${midX} ${y}, ${endX} ${y}`;
                path.setAttribute("d", d);
                path.classList.add("connection-line");
                path.style.animationDelay = `${index * 0.08}s`;
                svg.appendChild(path);

                const card = document.createElement('div');
                card.className = `node-card ${config.side}`;
                card.innerHTML = `<i class="${task.icon}"></i><span>${task.title}</span>`;
                
                card.style.left = config.side === 'right' ? `${endX}px` : `${endX - config.cardWidth}px`;
                card.style.top = `${y - 22}px`;
                card.style.animationDelay = `${index * 0.08 + 0.3}s`;
                
                card.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    openModal(task.title, task.link);
                });
                
                mindmap.appendChild(card);
            }

            tasks.forEach((task, i) => {
                const isLeft = i < 6;
                const config = isLeft ? leftConfig : rightConfig;
                createBranch(task, config, isLeft ? i : i - 6);
            });
        }

        // === ОБРАБОТЧИК КЛИКОВ ДЛЯ МОБИЛЬНЫХ (ГЛОБАЛЬНАЯ ФУНКЦИЯ) ===
        function handleMobileClick(index) {
            const task = tasks[index];
            if (task) {
                openModal(task.title, task.link);
            }
        }

        // === ИНИЦИАЛИЗАЦИЯ ===
        function init() {
            createDesktopBranches();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // === МОДАЛЬНОЕ ОКНО (ГЛОБАЛЬНЫЕ ФУНКЦИИ) ===
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalIcon = document.getElementById('modalIcon');
        const modalLink = document.getElementById('modalLink');

        function openModal(title, link) {
            modalTitle.textContent = title;
            modalIcon.innerHTML = `<i class="fas fa-file-alt"></i>`;
            modalLink.href = link;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Делаем функции глобальными для iOS
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.handleMobileClick = handleMobileClick;

        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
