<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Assets/CSS/main.css">
    <title>Хранилище Интеллект-карт</title>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">Хранилище</div>
            <!-- Поиск -->
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Поиск изображений..." id="searchInput">
            </div>
            <!-- Сортировка -->
            <div class="filter-group">
                <div class="filter-title">Сортировка</div>
                <select id="sort">
                    <option value="All">Все</option>
                    <option value="Nat">Естественные</option>
                    <option value="Hum">Гуманитарные</option>
                    <option value="Oth">Другое</option>
                </select>
            </div>

        </aside>

        <!-- Main content -->
        <main class="main">
            <div class="cards-grid" id="cardsGrid">
                <!-- Карточки будут здесь -->
                <div class="card" id="0" value="Право Теория" data-category="Hum">
                    <a href="Assets/Maps/Данил Давыдов_10А_Право. Теория. СОДЕРЖАНИЕ. (2) (1).html"><img src="Assets/Img/право.png"
                            alt="Право.Теория"></a>
                    <div class="card-title">Право Теория</div>
                </div>
                <div class="card" id="1" value="Информатика" data-category="Nat">
                    <a href="Assets/Maps/V2.0_ЕГЭ по информатике и ИКТ (6).html"><img src="Assets/Img/Информатика.png"
                            alt="Информатика"></a>
                    <div class="card-title">Информатика</div>
                </div>
                <div class="card" id="2" value="Русский язык" data-category="Hum">
                    <a href="https://www.mindmeister.com/app/map/3971134932?t=gsIUDssyK8"><img src="Assets/Img/Русский.png"
                            alt="Русский"></a>
                    <div class="card-title">Русский язык</div>
                </div>
                <div class="card" id="3" value="Экономика" data-category="Hum">
                    <a href="Assets/Maps/Интеллект-карта по блоку Экономика с терминами.html"><img
                            src="Assets/Img/экономика.png" alt="Экономика"></a>
                    <div class="card-title">Экономика</div>
                </div>
                <div class="card" id="4" value="Математика" data-category="Nat">
                    <a href="Assets/Maps/Математика.html"><img src="Assets/Img/математика.png" alt="Математика"></a>
                    <div class="card-title">Математика</div>
                </div>
                <div class="card" id="5" value="Исскуственный интеллект" data-category="Oth">
                    <a href="https://clck.ru/3Tco3E"><img src="Assets/Img/ИИ.png" alt="Исскуственный интеллект"></a>
                    <div class="card-title">Исскуственный интеллект</div>
                </div>
                <div class="card" id="6" value="Право Термины" data-category="Hum">
                    <a href="Assets/Maps/Данил Давыдов_10А_ПРАВО. Термины и понятия (2).html"><img src="Assets/Img/право.png"
                            alt="Право.Практика"></a>
                    <div class="card-title">Право Термины</div>
                </div>
            </div>
        </main>
    </div>
    <script src="Assets/JS/main.js"></script>
</body>

</html>
